<!doctype html>
<html lang="vi">
  <head>
    <script>
      // Apply dark mode class BEFORE any rendering to prevent flash
      (function() {
        var theme = localStorage.getItem('theme') || localStorage.theme;
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sustainable Exchange — Trao đổi bền vững</title>
    <meta name="description" content="Nền tảng mua bán, trao đổi đồ cũ uy tín. Kéo dài vòng đời sản phẩm vì môi trường." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>

  </body>
</html>
